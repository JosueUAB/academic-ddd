services:
  backend:
    image: ghcr.io/josueuab/academic-ddd-backend:latest
    env_file: .env.production
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: ./packages/frontend/Dockerfile
      args:
        - VITE_GA_ID=G-WX4JD0120Q
        - VITE_API_BASE=http://18.230.224.188:3000
    image: ghcr.io/josueuab/academic-ddd-frontend:latest
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  # Reverse proxy único para cumplir:
  # - http://18.230.224.188/ -> frontend
  # - http://18.230.224.188/api/auth/login -> backend POST /auth/login
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/docker-compose.prod.conf:/etc/nginx/conf.d/default.conf:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: academic
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

